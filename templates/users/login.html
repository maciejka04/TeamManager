{% extends "base.html" %}
{% block content %}
    <h2>Logowanie</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Zaloguj</button>
    </form>
    <p>Nie masz konta? <a href="{% url 'register' %}">Zarejestruj się</a></p>
    <p><a href="{% url 'password_reset' %}">Zapomniałeś hasła?</a></p>
{% endblock %}
